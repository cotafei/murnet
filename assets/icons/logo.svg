<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- MurNet: cat silhouette = M monogram. One shape, no decoration. -->
  <defs>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
    <radialGradient id="disc" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- background disc -->
  <circle cx="128" cy="128" r="124" fill="url(#disc)"/>

  <!-- cat head silhouette: two triangular ears + rounded jaw
       Two peaks read as the letter M when squinting. -->
  <path d="
    M 56 96
    L 80 36
    L 108 86
    L 148 86
    L 176 36
    L 200 96
    C 200 168, 168 208, 128 208
    C 88 208, 56 168, 56 96
    Z"
    fill="url(#mark)"/>

  <!-- single accent: one eye-dot, hinting at the cat without drawing a face -->
  <circle cx="128" cy="148" r="4" fill="#0d1117"/>
</svg>
