<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <!-- Logo + wordmark, horizontal. Like Stripe/Linear. -->
  <defs>
    <style>
      .wm { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-weight: 600; letter-spacing: -1px; }
      .tag { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 11px; letter-spacing: 3px; }
    </style>
  </defs>

  <!-- mark -->
  <g transform="translate(20, 20) scale(0.31)">
    <circle cx="128" cy="128" r="124" fill="#0d1117"/>
    <path d="
      M 56 96 L 80 36 L 108 86 L 148 86 L 176 36 L 200 96
      C 200 168, 168 208, 128 208 C 88 208, 56 168, 56 96 Z"
      fill="#e6edf3"/>
    <circle cx="128" cy="148" r="4" fill="#0d1117"/>
  </g>

  <!-- wordmark -->
  <text x="120" y="64" class="wm" font-size="44" fill="#e6edf3">murnet</text>
  <text x="120" y="88" class="tag" fill="#8b949e">КОШАЧИЙ ИНТЕРНЕТ</text>
</svg>
