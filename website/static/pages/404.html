<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>404 — MurNet</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{background:#0a0c10;color:#e6edf3;min-height:100vh;
    font-family:'Inter','Segoe UI',system-ui,sans-serif}
  body{display:flex;align-items:center;justify-content:center;padding:32px}

  .wrap{max-width:520px;width:100%;text-align:center}

  .glyph{font-family:'JetBrains Mono',Consolas,monospace;font-size:140px;font-weight:700;
    line-height:1;letter-spacing:-6px;margin-bottom:24px;
    background:linear-gradient(135deg,#5b8def 0%,#5fbf86 50%,#a78bfa 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}

  .code{font-family:'JetBrains Mono',Consolas,monospace;font-size:11px;letter-spacing:3px;
    color:#7d8590;text-transform:uppercase;margin-bottom:8px}

  h1{font-size:24px;font-weight:600;letter-spacing:-.5px;margin-bottom:14px}
  p{color:#7d8590;font-size:14px;line-height:1.6;margin-bottom:28px}
  p code{background:#11151c;color:#a78bfa;padding:2px 8px;border-radius:4px;
    font-family:'JetBrains Mono',Consolas,monospace;font-size:12px;border:1px solid #1f2530}

  .actions{display:flex;gap:10px;justify-content:center}
  .btn{padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;
    border:1px solid;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:#e6edf3;color:#0a0c10;border-color:#e6edf3}
  .btn-primary:hover{background:#fff}
  .btn-ghost{background:transparent;color:#e6edf3;border-color:#2a313e}
  .btn-ghost:hover{background:#11151c}
</style>
</head>
<body>
<div class="wrap">
  <div class="glyph">404</div>
  <div class="code">PAGE NOT FOUND</div>
  <h1>Сервис на месте, страницы нет</h1>
  <p>Hidden service <code>fgsesxh6fb…murnet</code> отвечает,
     но запрошенный путь не существует. Опечатка в адресе?</p>
  <div class="actions">
    <a class="btn btn-ghost" href="javascript:history.back()">← Назад</a>
    <a class="btn btn-primary" href="/">На главную</a>
  </div>
</div>
</body>
</html>
